<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Pedido Especial 💖</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #ffdde1;
      margin: 0;
      padding: 0;
    }

    h1 {
      margin-top: 30px;
    }

    img {
      width: 250px;
      border-radius: 15px;
      margin-top: 20px;
    }

    .buttons {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #sim {
      background: #2196F3;
      color: white;
    }

    #nao {
      background: #f44336;
      color: white;
    }

    #setoca {
      background: #4CAF50;
      color: white;
    }

    #videoContainer {
      display: none;
      margin-top: 20px;
    }

    #mensagemBulba {
      display: none;
      margin-top: 25px;
      background: #fff9c4;
      border: 2px solid #f9a825;
      border-radius: 12px;
      padding: 15px 20px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      font-size: 16px;
      color: #333;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <h1>Quer namorar comigo? 💕</h1>

  <!-- FOTO -->
  <img src="foto.jpg" alt="Nós dois">

  <div class="buttons">
    <button id="sim">SIM 😍</button>
    <button id="nao">NÃO 😈</button>
    <button id="setoca">se toca agora eu não quero você</button>
  </div>

  <!-- VÍDEO -->
  <div id="videoContainer">
    <h2>Sabia que você ia dizer sim 😎❤️</h2>
    <video width="300" controls>
      <source src="video.mp4" type="video/mp4">
      Seu navegador não suporta vídeo.
    </video>
  </div>

  <!-- MENSAGEM BULBASAUR -->
  <div id="mensagemBulba">
    🌿 Olá Raila, você sabia que o Bulbasaur armazena energia solar no bulbo das costas, permitindo passar dias sem comer, e é conhecido pela lealdade? 🌱
  </div>

  <script>
    const btnSim = document.getElementById("sim");
    const btnNao = document.getElementById("nao");
    const btnSetoca = document.getElementById("setoca");
    const video = document.getElementById("videoContainer");
    const mensagemBulba = document.getElementById("mensagemBulba");

    // Clique no SIM
    btnSim.onclick = () => {
      video.style.display = "block";
      mensagemBulba.style.display = "none";
    };

    // Clique no NÃO
    btnNao.onclick = () => {
      alert("Por que? 😭💔");
    };

    // Clique no SE TOCA
    btnSetoca.onclick = () => {
      mensagemBulba.style.display = "block";
      video.style.display = "none";
    };
  </script>

</body>
</html>
